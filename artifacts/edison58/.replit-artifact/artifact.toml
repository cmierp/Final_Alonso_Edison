kind = "web"
previewPath = "/"
title = "Edison 58 — Landing Page"
version = "1.0.0"
id = "artifacts/edison58"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19974

[services.development]
run = "pnpm --filter @workspace/edison58 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/edison58", "run", "build" ]
publicDir = "artifacts/edison58/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19974"
BASE_PATH = "/"
